# <small>pratiques discrètes et transformation du métier</small>

Note:
Pratiques discrètes, non documentées, sont fondamentalement transformatrices du métier -- à la fois cause et conséquence de cette transformation.

Ces pratiquers discrètes sont indissociables de plusieurs phénomènes:

- l'émergence de l'informatiue personnelle dans un sens large (tablettes et smartphones inclus)
- la mise en réseau de ces ordinateurs
- la numérisation massive et, éventuellement, la mise en données de ce qui est numérisé
- la numérisation de plus en plus importante de nos vies, c'est-à-dire la production massive de sources nativement numériques.
            </textarea>
          </section>
          <section data-markdown>
            <textarea data-template>
## <small>l'accumulation de salles de lecture (virtuelles ou non)</small>

<img src='img/veille.png' width='60%' />

Note:
La convergence de ces phénomènes -- et l'énorme travail des métiers du livre, de l'imprimé, du nativement numérique -- a engendré une multiplication des types de salles de lecture.

Bien sûr, les règles des 'anciens types' de salles de lecture, les physiques, sont toutes particulières, mais il y a souvent quelque chose d'assez ordonné dans ces règles, des habitudes que l'on peut prendre, etc.

Ce n'est peut-être pas tout-à-fait la même chose des salles de lecture virtuelles, très nombreuses, accessibles en ligne ou parfois dans les centres d'archives ou les bibliothèques -- le dépôt légal du web par exemple. Chacune aura ses choix. 

Si l'on prend le site des archives de La Société des Nations, il est assez proche finalement de la consultation d'une boîte d'archives. Pas de fonctions de lecture distante, par exemple.

Différent de ce qu'est l'équivalent de la salle de lecture d'internet archive, la wayback machine, avec des outils de visualisation de données, de ce que l'on appelle la lecture distante. Pareil à l'INA pour l'archive twitter par exemple.
            </textarea>

<img src="img/impresso.png" width=80% />

Note:
- très efficace. Donne accès parfois à des archives auxquelles nous n'aurions pas pensé
- mais c'est le risque de la décontextualisation


Donne un très grand aperçu de sources disponibles dans un fond pour une recherche. Mais il reste un coût, souvent, qui est la décontextualisation.

Exemple échange de lettre Kung - Schacht dans les archives de la chancellerie. 

Fin du respect des fonds, ou en tout cas de ce que les historiens et historiennes pouvaient en déduire.

Par contre, sérendipité nouvelle.

Il y a des solutions à ceci => impresso.

# conclusion

Note:
Revenons au titre et aux besoins des historiens et historiennes.

Les chercheurs sur le passé ont parfois besoin de stabilité. Ce que j'ai essayé de montrer aujourd'hui, ce que l'on a pu constater avec Caroline, c'est cette tension entre ce besoin de stabilité et une instabilité continue des outils, des méthodes mais surtout du contexte de la recherche.

Cette instabilité est double: il y a l'instabilité des politiques (et donc l'instabilité budgétaire), il y a l'instabilité de l'environnement numérique.

Finalement, c'est peut-être aussi le cas des archivistes.

Le résultat, c'est que les besoins des historiens et historiennes sont extrêmement variés:

- il y a d'abord un besoin des outils traditionnels, des salles de lecture traditionnelles, etc. Ce besoin reste, puisque tout n'est pas numérisé;
- il y a les besoins liés aux archives numérisés -- ce sont des besoins qui se traduisent par des interfaces de recherche, notamment;
- il y a les besoins liés aux archives nées numériques. Avec des recherches très poussées sur les archives du web, plus complexe pour les médias sociaux, et une situation plus nébuleuse pour les besoins des archives administratives plus classiques, nées numériques.

Le problème est que beaucoup d'entre nous ne connaissent pas leurs propres besoins.
